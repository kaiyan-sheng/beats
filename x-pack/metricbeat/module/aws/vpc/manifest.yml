default: true
input:
  module: aws
  metricset: cloudwatch
  defaults:
    metrics:
      - namespace: AWS/NATGateway
        statistic: ["Maximum"]
        name: ["ActiveConnectionCount"]
      - namespace: AWS/NATGateway
        statistic: ["Sum"]
        name: ["BytesInFromDestination", "BytesInFromSource", "BytesOutToDestination",
               "BytesOutToSource", "ConnectionAttemptCount", "ConnectionEstablishedCount",
               "ErrorPortAllocation", "IdleTimeoutCount", "PacketsDropCount",
               "PacketsInFromDestination", "PacketsInFromSource", "PacketsOutToDestination",
               "PacketsOutToSource"]
      - namespace: AWS/TransitGateway
        statistic: ["Average"]
        name: ["BytesIn", "BytesOut", "BytesOut", "PacketsIn", "PacketsOut",
               "PacketDropCountBlackhole", "PacketDropCountNoRoute"]
      - namespace: AWS/VPN
        statistic: ["Average"]
        name: ["TunnelState", "TunnelDataIn", "TunnelDataOut"]
